<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kota Kinabalu - Nature & Wildlife Map</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Kota Kinabalu Nature Map</h1>
        <p>Explore the wild beauty and natural wonders of Sabah</p>
    </header>

    <main class="container">
        <div class="map-section">
            <div class="map-container" id="map-container">
                <img src="assets/map-base.svg" alt="Kota Kinabalu Nature Map" id="map-image">
                <!-- Visual Markers (Overlay for better UX) -->
                <div id="markers-overlay"></div>
            </div>
        </div>

        <aside class="info-panel" id="info-panel">
            <div id="info-content">
                <h2>Select a location</h2>
                <p>Hover over the markers on the map to see place names, or click for more details.</p>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
